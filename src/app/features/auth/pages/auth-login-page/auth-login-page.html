<div class="page">
    <div class="logo">
        <h2 class="logo-title">Checkmate</h2>
        <span class="logo-separator"></span>
    </div>

    <div class="card">
        <h1 class="title">Connexion</h1>
        <p class="subtitle">Rejoignez l'élite du jeu d'échecs.</p>

<form [formGroup]="formLogin" (ngSubmit)="onSubmit()">
    <div class="field">
        <label class="label" for="identifier">Votre identifiant</label>
        <input
            class="input"
            type="text" 
            id="identifier"
            formControlName="identifier"
            placeholder="Pseudo ou exemple@email.com"
        />
        <app-forms-error-display [control]="identifier" name="identifiant"/>
    </div>

    <div class="field">
        <div class="label-row">
            <label class="label" for="password">Mot de passe</label>
        </div>
        <input
            class="input"
            type="password"
            id="password"
            formControlName="password"
        />
        <app-forms-error-display [control]="password" name="mot de passe"/>
    </div>

    <app-button
        extraClasses="btn-primary form-btn"
        label="Se connecter ›"
        type="submit"
        [disabled]="formLogin.invalid" />
</form>

        <p class="register">
            Pas encore de compte ?
            <app-links
                extraClasses="register"
                label="S'inscrire"
                link="/auth/register"
            ></app-links>
        </p>
    </div>
</div>
