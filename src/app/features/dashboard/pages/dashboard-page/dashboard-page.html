<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Arena</div>
    <div class="nav-section">
      <div class="section-label">Tournaments</div>
      <app-links label="Créer" link="/dashboard/add" />
    </div>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">AD</div>
        <div class="user-info"><div class="user-name">Admin</div></div>
      </div>
    </div>
  </aside>

  <main class="content">
    @if (tournaments().length > 0) {
      <app-table 
        [columns]="columns" 
        [data]="tournaments()" 
        (clickDelete)="handleDeleteClick($event)" 
      /> 
    }

    @if (tournamentToDelete()) {
      <app-delete-modal 
        [itemName]="tournamentToDelete()!.name"
        (onConfirm)="onConfirmDelete()"
        (onCancel)="tournamentToDelete.set(null)"
      />
    }
  </main>
</div>
