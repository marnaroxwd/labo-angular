<button 
    (click)="onAction()" 
    [class]="'btn ' + extraClasses()" 
    [type]="type()" 
    [disabled]="disabled()"
    [attr.aria-label]="icon() ? label() : null"
>
    @if (icon()) {
        <img [src]="icon()" alt="" aria-hidden="true" class="btn__icon" />
    } @else {
        {{ label() }}
    }
</button>
