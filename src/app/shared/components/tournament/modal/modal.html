<div class="modal-overlay">
  <div class="modal-content">
    
    <header class="modal-header">
      <h2>Modifier les informations</h2>
      <button class="close-btn">&times;</button>
    </header>

    <form class="modal-body">
      <div class="input-group">
        <label for="name">Nom complet</label>
        <input type="text" id="name" value="Jean Dupont" />
      </div>
      
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" value="jean@exemple.com" />
      </div>

      <div class="input-group">
        <label for="role">Rôle</label>0
        <select id="role">
          <option>Administrateur</option>
          <option selected>Éditeur</option>
        </select>
      </div>
    </form>

    <footer class="modal-footer">
      <button class="btn-secondary">Annuler</button>
      <button class="btn-primary">Enregistrer les modifications</button>
    </footer>

  </div>
</div>
